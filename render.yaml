services:
  - type: web
    name: secretaria-operativa-ai-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TIMEZONE
        value: America/New_York
      - key: REPORT_CRON
        value: "0 8 * * 1-5"
